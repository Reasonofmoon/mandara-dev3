<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevKB - 개발자 지식 베이스</title>
<style>
:root {
  --bg: #0f1117;
  --bg-card: #1a1d27;
  --bg-hover: #242836;
  --bg-sidebar: #141620;
  --border: #2a2e3d;
  --text: #e4e6ed;
  --text-dim: #8b8fa3;
  --accent: #6c8cff;
  --accent-hover: #8ba5ff;
  --green: #4ade80;
  --yellow: #fbbf24;
  --red: #f87171;
  --orange: #fb923c;
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --pink: #f472b6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Pretendard', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); }

/* Layout */
.app { display: grid; grid-template-columns: 260px 1fr 280px; grid-template-rows: 56px 48px 1fr; height: 100vh; }
.topbar { grid-column: 1/-1; background: var(--bg-sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; }
.topbar h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
.topbar .entry-points { display: flex; gap: 8px; margin-left: auto; }
.entry-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 13px; transition: all .15s; }
.entry-btn:hover, .entry-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.entry-btn .icon { margin-right: 4px; }

/* Filter bar */
.filterbar { grid-column: 2/3; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 8px; overflow-x: auto; }
.filter-chip { padding: 4px 10px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; font-size: 12px; white-space: nowrap; transition: all .15s; }
.filter-chip:hover, .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Sidebar */
.sidebar { grid-row: 2/4; background: var(--bg-sidebar); border-right: 1px solid var(--border); overflow-y: auto; padding: 8px 0; }
.sidebar-section { padding: 8px 16px; }
.sidebar-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; }
.sidebar-item { padding: 6px 16px; font-size: 13px; color: var(--text-dim); cursor: pointer; border-radius: 4px; transition: all .1s; display: flex; align-items: center; gap: 6px; }
.sidebar-item:hover { background: var(--bg-hover); color: var(--text); }
.sidebar-item.active { background: var(--accent); color: #fff; }
.sidebar-item .badge { font-size: 10px; padding: 1px 6px; border-radius: 8px; background: var(--bg-hover); color: var(--text-dim); margin-left: auto; }
.sidebar-group-title { padding: 8px 16px 4px; font-size: 12px; font-weight: 600; color: var(--text); cursor: pointer; }
.sidebar-group-title:hover { color: var(--accent); }

/* Main content */
.main { grid-row: 3/4; overflow-y: auto; padding: 24px; }

/* Search */
.search-container { max-width: 720px; margin: 0 auto 32px; }
.search-box { width: 100%; padding: 14px 20px 14px 44px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); font-size: 15px; outline: none; transition: border-color .15s; }
.search-box:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
.search-wrapper { position: relative; }
.search-mode-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
.search-mode { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; font-size: 13px; }
.search-mode.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Cards grid */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; max-width: 960px; margin: 0 auto; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; transition: all .15s; }
.card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.3); }
.card-type { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; font-weight: 600; margin-bottom: 8px; }
.card-type.pattern { color: var(--green); }
.card-type.error { color: var(--red); }
.card-type.flow { color: var(--cyan); }
.card-type.prompt { color: var(--purple); }
.card-type.reference { color: var(--yellow); }
.card h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.card p { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--bg-hover); color: var(--text-dim); }
.tag.family { background: rgba(108,140,255,.15); color: var(--accent); }
.tag.layer { background: rgba(74,222,128,.15); color: var(--green); }
.tag.eclass { background: rgba(248,113,113,.15); color: var(--red); }

/* Detail view */
.detail-view { max-width: 800px; margin: 0 auto; }
.detail-header { margin-bottom: 24px; }
.detail-header h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.detail-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.detail-body { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 28px; }
.detail-body h3 { font-size: 16px; font-weight: 600; color: var(--accent); margin: 24px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.detail-body h3:first-child { margin-top: 0; }
.detail-body p, .detail-body li { font-size: 14px; line-height: 1.7; }
.detail-body ul { padding-left: 20px; margin: 8px 0; }
.detail-body pre { background: #0d0f16; border: 1px solid var(--border); border-radius: 8px; padding: 16px; overflow-x: auto; margin: 12px 0; font-size: 13px; line-height: 1.5; }
.detail-body code { font-family: 'JetBrains Mono', 'Fira Code', monospace; color: var(--cyan); font-size: 13px; }
.detail-body pre code { color: var(--text); }
.back-btn { display: inline-flex; align-items: center; gap: 4px; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-dim); cursor: pointer; font-size: 13px; margin-bottom: 16px; }
.back-btn:hover { background: var(--bg-hover); color: var(--text); }

/* Right panel */
.rightpanel { grid-row: 2/4; background: var(--bg-sidebar); border-left: 1px solid var(--border); overflow-y: auto; padding: 16px; }
.rp-section { margin-bottom: 20px; }
.rp-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }
.rp-item { padding: 6px 10px; font-size: 12px; color: var(--text-dim); border-radius: 6px; cursor: pointer; transition: all .1s; border: 1px solid transparent; }
.rp-item:hover { background: var(--bg-hover); color: var(--text); border-color: var(--border); }
.rp-coord { font-size: 12px; color: var(--text-dim); padding: 8px 10px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); }
.rp-coord .label { color: var(--text-dim); font-size: 11px; }
.rp-coord .value { color: var(--text); font-weight: 500; }

/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-width: 720px; margin: 0 auto 32px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
.stat-num { font-size: 28px; font-weight: 700; }
.stat-num.p { color: var(--green); }
.stat-num.e { color: var(--red); }
.stat-num.f { color: var(--cyan); }
.stat-num.pr { color: var(--purple); }
.stat-label { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

/* Home hero */
.hero { text-align: center; max-width: 640px; margin: 0 auto 40px; padding-top: 20px; }
.hero h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.hero p { color: var(--text-dim); font-size: 15px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* Responsive */
@media (max-width: 1024px) {
  .app { grid-template-columns: 220px 1fr 0; }
  .rightpanel { display: none; }
}
@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; grid-template-rows: 56px 48px 1fr; }
  .sidebar { display: none; }
  .filterbar { grid-column: 1; }
}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Top bar -->
  <div class="topbar">
    <h1>🔧 DevKB</h1>
    <span style="font-size:13px;color:var(--text-dim)">개발자 지식 베이스</span>
    <div class="entry-points">
      <button class="entry-btn active" onclick="setEntry('all')"><span class="icon">🏠</span>전체</button>
      <button class="entry-btn" onclick="setEntry('build')"><span class="icon">🛠</span>만들고 싶다</button>
      <button class="entry-btn" onclick="setEntry('fix')"><span class="icon">🔍</span>고치고 싶다</button>
      <button class="entry-btn" onclick="setEntry('ref')"><span class="icon">📖</span>문법 확인</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar"></div>

  <!-- Filter bar -->
  <div class="filterbar" id="filterbar"></div>

  <!-- Main -->
  <div class="main" id="main"></div>

  <!-- Right panel -->
  <div class="rightpanel" id="rightpanel"></div>
</div>

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';

  // Learn
  html += `<div class="sidebar-section">`;
  html += `<div class="sidebar-title">📚 Learn (패턴)</div>`;
  const families = [...new Set(PATTERNS.map(p=>p.family))].sort();
  families.forEach(f => {
    const items = PATTERNS.filter(p=>p.family===f);
    html += `<div class="sidebar-group-title" onclick="toggleGroup(this)">${f} (${items.length})</div>`;
    items.forEach(p => {
      html += `<div class="sidebar-item ${currentItem?.id===p.id?'active':''}" onclick="openItem('pattern','${p.id}')">
        <span>${p.title.replace(/ 패턴$/,'')}</span>
        <span class="badge">${p.layer}</span>
      </div>`;
    });
  });
  html += `</div>`;

  // Errors
  html += `<div class="sidebar-section">`;
  html += `<div class="sidebar-title">🐛 Errors (오류)</div>`;
  const eclasses = [...new Set(ERRORS.map(e=>e.eclass))].sort();
  eclasses.forEach(ec => {
    const items = ERRORS.filter(e=>e.eclass===ec);
    html += `<div class="sidebar-group-title" onclick="toggleGroup(this)">${ec} (${items.length})</div>`;

      html += `<div class="sidebar-item ${currentItem?.id===e.id?'active':''}" onclick="openItem('error','${e.id}')">
        <span>${e.title}</span>

    });

  html += `<div class="sidebar-title">🔄 Flows (해결 플로우)</div>`;

      <span>${f.title}</span>
    </div>`;
  });

  // References
  html += `<div class="sidebar-section">`;
  html += `<div class="sidebar-title">📖 References</div>`;
  REFERENCES.forEach(r => {
    html += `<div class="sidebar-item" onclick="openItem('reference','${r.id}')">

function renderCard(item) {
  if (item._type === 'pattern') {
    return `<div class="card" onclick="openItem('pattern','${item.id}')">
      <div class="card-type pattern">PATTERN</div>
      <h3>${item.title}</h3>
      <p>${item.desc}</p>
      <div class="card-tags">
        <span class="tag family">${item.family}</span>
        <span class="tag layer">${item.layer}</span>
        ${item.tags.slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>
    </div>`;
  }
  if (item._type === 'error') {
    return `<div class="card" onclick="openItem('error','${item.id}')">
      <div class="card-type error">ERROR</div>
      <h3>${item.title}</h3>
      <p>${item.desc}</p>
      ${item.msg ? `<p style="font-family:monospace;font-size:12px;color:var(--red);margin-top:6px">${item.msg}</p>` : ''}
      <div class="card-tags">
        <span class="tag eclass">${item.eclass}</span>
        ${item.tags.slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>
    </div>`;
  }
  if (item._type === 'flow') {
    return `<div class="card" onclick="openItem('flow','${item.id}')">
      <div class="card-type flow">FLOW</div>
      <h3>${item.title}</h3>
      <div class="card-tags">
        ${item.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>
    </div>`;
  }
  if (item._type === 'reference') {
    return `<div class="card" onclick="openItem('reference','${item.id}')">
      <div class="card-type reference">REFERENCE</div>
      <h3>${item.title}</h3>
      <div class="card-tags">
        ${item.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>
    </div>`;
  }
  return '';
}

    html += `</ul>`;
    html += `<h3>연결된 해결 플로우</h3><ul>`;

function setEntry(entry) {
  currentEntry = entry;
  currentView = 'home';
  currentItem = null;
  searchQuery = '';
  if(entry==='build') searchMode = 'build';
  else if(entry==='fix') searchMode = 'error';
  else if(entry==='ref') searchMode = 'ref';
  else searchMode = 'all';
  render();
}

function setSearchMode(mode) {
  searchMode = mode;
  render();
}

function updateSearch(q) {
  searchQuery = q;
  render();
}

function toggleFilter(tag) {
  if (activeFilters.has(tag)) activeFilters.delete(tag);
  else activeFilters.add(tag);
  render();
}

function clearFilters() {
  activeFilters.clear();
  render();
}

function openItem(type, id) {
  const collections = {pattern:PATTERNS, error:ERRORS, flow:FLOWS, reference:REFERENCES};
  const item = collections[type].find(x => x.id === id);
  if (item) {
    currentItem = {...item, _type: type};
    currentView = 'detail';
    render();
    document.getElementById('main').scrollTop = 0;
  }
}

function goHome() {
  currentView = 'home';
  currentItem = null;
  render();
}

function toggleGroup(el) {
  let next = el.nextElementSibling;
  while (next && next.classList.contains('sidebar-item')) {
    next.style.display = next.style.display === 'none' ? 'flex' : 'none';
    next = next.nextElementSibling;
  }
}

function getSearchPlaceholder() {
  if(searchMode==='build') return '무엇을 만들고 싶은가? 예: Next.js role-based admin';
  if(searchMode==='error') return '무슨 문제가 보이는가? 예: Hydration failed';
  if(searchMode==='ref') return '정확한 문법이 뭐였지? 예: fetch credentials';
  return '패턴, 오류, 플로우를 검색하세요...';
}

function getFilteredItems() {
  let items = [];

  if (searchMode==='all' || searchMode==='build') {
    items.push(...PATTERNS.map(p=>({...p, _type:'pattern'})));
  }
  if (searchMode==='all' || searchMode==='error') {
    items.push(...ERRORS.map(e=>({...e, _type:'error'})));
  }
  if (searchMode==='all') {
    items.push(...FLOWS.map(f=>({...f, _type:'flow'})));
  }
  if (searchMode==='ref') {
    items.push(...REFERENCES.map(r=>({...r, _type:'reference'})));
  }

  // Apply entry filter
  if (currentEntry === 'build') items = items.filter(i=>i._type==='pattern');
  if (currentEntry === 'fix') items = items.filter(i=>i._type==='error'||i._type==='flow');
  if (currentEntry === 'ref') items = items.filter(i=>i._type==='reference');

  // Apply search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    items = items.filter(i => {
      const searchText = [i.title, i.desc||'', i.msg||'', ...(i.tags||[]), i.id, i.family||'', i.eclass||''].join(' ').toLowerCase();
      return searchText.includes(q);
    });
  }

  // Apply tag filters
  if (activeFilters.size > 0) {
    items = items.filter(i => {
      const itemTags = i.tags || [];
      return [...activeFilters].some(f => itemTags.includes(f));
    });
  }

  return items.slice(0, 60);
}

// Init
render();
</script>
